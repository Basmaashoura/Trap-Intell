services:
  # ===========================================
  # Trap-Intel API Service
  # ===========================================
  trap-intel-api:
    build:
      context: .
      dockerfile: Trap-Intel.Api/Dockerfile
    container_name: trap-intel-api
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
      - ASPNETCORE_HTTP_PORTS=8080
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=trapintel;Username=trapintel_user;Password=TrapIntel_Secure_2024!;Include Error Detail=true
      - Authentication__Jwt__SecretKey=TrapIntel-Docker-Dev-Secret-Key-At-Least-32-Characters-Long!
      - Serilog__SeqServerUrl=http://seq:5341
      - EmailSettings__SmtpHost=mailpit
      - EmailSettings__SmtpPort=1025
      - EmailSettings__EnableSsl=false
      - EmailSettings__SenderEmail=noreply@trapintel.local
      - EmailSettings__SenderName=Trap-Intel System
      - EmailSettings__FrontendBaseUrl=http://localhost:3000
      - Cloudinary__CloudName=${CLOUDINARY_CLOUD_NAME:-}
      - Cloudinary__ApiKey=${CLOUDINARY_API_KEY:-}
      - Cloudinary__ApiSecret=${CLOUDINARY_API_SECRET:-}
      - Cloudinary__UserMediaFolder=trap-intel/docker/users
      - Cloudinary__OrganizationMediaFolder=trap-intel/docker/organizations
      - Cloudinary__MaxFileSizeBytes=5242880
      - Cloudinary__MaxParallelUploads=4
      - OpenTelemetry__Otlp__Endpoint=http://otel-collector:4317
      - OpenTelemetry__Otlp__Protocol=Grpc
    depends_on:
      postgres:
        condition: service_healthy
      seq:
        condition: service_started
      mailpit:
        condition: service_started
      otel-collector:
        condition: service_started
    networks:
      - trap-intel-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ===========================================
  # PostgreSQL Database
  # ===========================================
  postgres:
    image: postgres:16-alpine
    container_name: trap-intel-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=trapintel_user
      - POSTGRES_PASSWORD=TrapIntel_Secure_2024!
      - POSTGRES_DB=trapintel
      - POSTGRES_INITDB_ARGS=--encoding=UTF8 --locale=en_US.utf8
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/init-scripts/01-init-database.sql:/docker-entrypoint-initdb.d/01-init-database.sql:ro
    networks:
      - trap-intel-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trapintel_user -d trapintel"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ===========================================
  # Seq - Centralized Logging
  # ===========================================
  seq:
    image: datalust/seq:latest
    container_name: trap-intel-seq
    ports:
      - "5341:80"     # Web UI
      - "5342:5341"   # Ingestion API
    environment:
      - ACCEPT_EULA=Y
      - SEQ_FIRSTRUN_NOAUTHENTICATION=true
    volumes:
      - seq-data:/data
    networks:
      - trap-intel-network
    restart: unless-stopped

  # ===========================================
  # Mailpit - Email Testing
  # ===========================================
  mailpit:
    image: axllent/mailpit:latest
    container_name: trap-intel-mailpit
    ports:
      - "8025:8025"   # Web UI
      - "1025:1025"   # SMTP
    environment:
      - MP_MAX_MESSAGES=500
      - MP_DATABASE=/data/mailpit.db
      - MP_SMTP_AUTH_ACCEPT_ANY=true
      - MP_SMTP_AUTH_ALLOW_INSECURE=true
    volumes:
      - mailpit-data:/data
    networks:
      - trap-intel-network
    restart: unless-stopped

  # ===========================================
  # OpenTelemetry Collector
  # ===========================================
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.104.0
    container_name: trap-intel-otel-collector
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./docker/observability/otel-collector-config.yml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC receiver
      - "4318:4318"   # OTLP HTTP receiver
      - "8889:8889"   # Prometheus exporter endpoint
    networks:
      - trap-intel-network
    restart: unless-stopped

# ===========================================
# Networks
# ===========================================
networks:
  trap-intel-network:
    driver: bridge
    name: trap-intel-network

# ===========================================
# Volumes
# ===========================================
volumes:
  postgres-data:
    name: trap-intel-postgres-data
  seq-data:
    name: trap-intel-seq-data
  mailpit-data:
    name: trap-intel-mailpit-data
